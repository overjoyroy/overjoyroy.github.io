<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokémon Card Lists</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f0f5; color: #222; min-height: 100vh; }
.topbar { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.topbar svg { flex-shrink: 0; }
.topbar h1 { font-size: 1rem; font-weight: 700; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 32px 24px; max-width: 900px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 20px; text-decoration: none; color: #222; box-shadow: 0 2px 8px rgba(0,0,0,.1); display: flex; flex-direction: column; gap: 6px; transition: box-shadow .15s, transform .15s; }
.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.15); transform: translateY(-2px); }
.card-title { font-size: 1rem; font-weight: 700; }
.card-count { font-size: .8rem; color: #888; }
.card-note { font-size: .75rem; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="22" height="22" aria-hidden="true"><path d="M5 50 A45 45 0 0 1 95 50Z" fill="#e53238"/><path d="M5 50 A45 45 0 0 0 95 50Z" fill="#f5f5f5"/><circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="5"/><line x1="5" y1="50" x2="95" y2="50" stroke="#333" stroke-width="5"/><circle cx="50" cy="50" r="13" fill="#333"/><circle cx="50" cy="50" r="8" fill="#f5f5f5"/></svg>
  <h1>Pokémon Card Lists</h1>
</div>

<div class="grid">
  <a class="card" href="dragonite.html">
    <span class="card-title">Dragonite</span>
    <span class="card-count">49 cards · all sets</span>
    <span class="card-note">Check off what you have</span>
  </a>
  <a class="card" href="lugia.html">
    <span class="card-title">Lugia</span>
    <span class="card-count">37 cards · all sets</span>
    <span class="card-note">Check off what you have</span>
  </a>
  <a class="card" href="cyndaquil_quilava_typhlosion.html">
    <span class="card-title">Cyndaquil · Quilava · Typhlosion</span>
    <span class="card-count">60 cards · all sets</span>
    <span class="card-note">Check off what you have</span>
  </a>
</div>

</body>
</html>
